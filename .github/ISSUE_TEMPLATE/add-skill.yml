name: Add a Skill
description: Recommend a new Skill for the AWE ecosystem index
title: "feat: add <skill-name>"
labels: ["add-skill"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for recommending a new Skill! Maintainers will create the `entry.json` and add it to the index.
        If you're comfortable with GitHub PRs, you can also open a PR directly (see [CONTRIBUTING.md](../CONTRIBUTING.md)).

  - type: input
    id: slug
    attributes:
      label: Skill slug (unique id)
      description: Lowercase letters and hyphens, e.g. `my-agent-skill`
      placeholder: my-agent-skill
    validations:
      required: true

  - type: input
    id: github
    attributes:
      label: GitHub repository
      description: Format `owner/repo`, without `https://github.com/`
      placeholder: owner/repo
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Short description (English, primary)
      description: For AI and human discovery; keep to ≤ 120 characters
      placeholder: This skill helps...
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Skill type
      options:
        - skill (General Skill)
        - mcp (MCP Service)
        - agent (Agent Pack / Collection)
        - framework (Framework / SDK)
        - app (Application / Platform)
        - model (Model)
        - tool (Tool)
        - other (Other)
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags (comma-separated)
      description: Topic/capability tags; see tag-groups.json for recommended tag groups
      placeholder: multi-agent, dashboard
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: The repository is public
          required: true
        - label: Repo root contains a `SKILL.md` file
          required: true
        - label: Project is actively maintained (not archived)
          required: true
        - label: Skill is relevant to AWE / Autonomous World / Multi-Agent ecosystem
          required: true
